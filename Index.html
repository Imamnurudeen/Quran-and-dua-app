<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleeing to Allah - Quran & Dua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .theme-golden { background-color: #faf7ed; color: #b08d57; }
        .theme-sepia { background-color: #f4ecd8; color: #5b4636; }
        .theme-dark { background-color: #111827; color: #f3f4f6; }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="app" class="min-h-screen pb-20">
        <header class="sticky top-0 z-50 p-4 border-b flex justify-between items-center bg-white shadow-sm">
            <h1 class="font-bold text-lg">Fleeing to Allah</h1>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="p-2 border rounded-full">🎨</button>
            </div>
        </header>

        <main id="content" class="p-4 max-w-md mx-auto">
            </main>

        <nav class="fixed bottom-0 left-0 right-0 border-t bg-white flex justify-around p-3">
            <button onclick="showDuas()" class="flex flex-col items-center text-green-700">
                <span>🤲</span><span class="text-xs">Duas</span>
            </button>
            <button onclick="showQuran()" class="flex flex-col items-center">
                <span>📖</span><span class="text-xs">Quran</span>
            </button>
            <button onclick="showJournal()" class="flex flex-col items-center">
                <span>📝</span><span class="text-xs">Journal</span>
            </button>
        </nav>
    </div>

    <script>
        // App State
        let currentTheme = 'light';
        const themes = ['light', 'dark', 'sepia', 'golden'];

        [span_3](start_span)// Theme Toggle Functionality[span_3](end_span)
        function toggleTheme() {
            const body = document.body;
            themes.forEach(t => body.classList.remove('theme-' + t));
            const nextIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
            currentTheme = themes[nextIndex];
            if (currentTheme !== 'light') body.classList.add('theme-' + currentTheme);
        }

        // Module Switchers
        function showDuas() {
            document.getElementById('content').innerHTML = `
                <div class="animate-pulse bg-green-50 p-4 rounded-lg mb-6 border border-green-200">
                    <p class="text-sm italic">"So flee to Allah..." - Adh-Dhariyat 51:50</p>
                </div>
                <div id="dua-list"></div>
            `;
            renderDuaModule();
        }

        function showQuran() {
            document.getElementById('content').innerHTML = `
                <div class="flex gap-2 mb-4">
                    <button class="px-3 py-1 bg-green-600 text-white rounded-full text-xs">Mushaf</button>
                    <button class="px-3 py-1 border rounded-full text-xs">Bilingual</button>
                </div>
                <div class="text-right font-arabic text-3xl leading-loose py-4">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <p class="text-center italic text-gray-500">Premium Quran Module Loading...</p>
            `;
        }
        
        // Initial Load
        showDuas();
    </script>
</body>
</html>
