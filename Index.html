        function toggleTheme() {
            const body = document.body;
            themes.forEach(t => body.classList.remove('theme-' + t));
            const nextIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
            currentTheme = themes[nextIndex];
            if (currentTheme !== 'light') body.classList.add('theme-' + currentTheme);
        }

        // Module Switchers
        function showDuas() {
            document.getElementById('content').innerHTML = `

// --- Updated Render Function ---
function renderDuaModule() {
    let html = `
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4">Categories</h2>
            <div class="grid grid-cols-2 gap-3">
                ${duaData.categories.map(cat => `
                    <button onclick="showCategory('${cat.id}')" class="p-4 rounded-xl border border-green-200 bg-white shadow-sm text-center">
                        <span class="block text-sm font-semibold">${cat.name}</span>
                    </button>
                `).join('')}
            </div>
        </div>
    `;
    document.getElementById('content').innerHTML = html;
}

function showCategory(catId) {
    const cat = duaData.categories.find(c => c.id === catId);
    let html = `<button onclick="renderDuaModule()" class="mb-4 text-green-700 text-sm">← Back</button>`;
    html += `<h2 class="text-2xl font-bold mb-2">${cat.name}</h2>`;
    html += `<p class="text-sm opacity-70 mb-6">${cat.description}</p>`;
    
    cat.duas.forEach(dua => {
        html += `
            <div class="p-6 rounded-2xl border mb-4 bg-white/5 space-y-4 shadow-sm">
                <p class="text-right font-arabic text-3xl leading-loose">${dua.arabic}</p>
                <p class="text-xs italic opacity-60">${dua.trans}</p>
                <p class="text-sm font-medium">${dua.meaning}</p>
                <div class="flex justify-between items-center pt-2">
                    <span class="text-[10px] uppercase tracking-wider opacity-50">${dua.ref}</span>
                    <button class="text-green-600">🔊 Listen</button>
                </div>
            </div>
        `;
    });
    document.getElementById('content').innerHTML = html;
}
