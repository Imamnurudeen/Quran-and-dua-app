<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleeing to Allah - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .theme-golden { background-color: #faf7ed; color: #b08d57; }
        .theme-sepia { background-color: #f4ecd8; color: #5b4636; }
        .theme-dark { background-color: #111827; color: #f3f4f6; }
        #drawingCanvas { pointer-events: none; }
        #drawingCanvas.active { pointer-events: auto; }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="app" class="min-h-screen pb-20">
        <header id="header" class="sticky top-0 z-50 p-4 border-b flex justify-between items-center bg-white shadow-sm">
            <h1 class="font-bold text-lg">Fleeing to Allah</h1>
            <button onclick="toggleTheme()" class="p-2 border rounded-full">🎨</button>
        </header>

        <main id="content" class="p-4 max-w-md mx-auto">
            </main>

        <nav id="nav" class="fixed bottom-0 left-0 right-0 border-t bg-white flex justify-around p-3">
            <button onclick="showDuas()" class="flex flex-col items-center">🤲<span class="text-xs">Duas</span></button>
            <button onclick="showQuran()" class="flex flex-col items-center">📖<span class="text-xs">Quran</span></button>
            <button onclick="alert('Journal coming soon!')" class="flex flex-col items-center">📝<span class="text-xs">Journal</span></button>
        </nav>
    </div>

    <script>
        // --- APP STATE ---
        let currentTheme = 'light';
        const themes = ['light', 'dark', 'sepia', 'golden'];

        // --- DUA DATA ---
        const duaData = {
            categories: [
                { id: "rizq", name: "Rizq & Provision", duas: [
                    { arabic: "اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ", trans: "Allāhumma-kfinī bi-ḥalālika...", meaning: "O Allah, suffice me with what You have made lawful...", ref: "Tirmidhi 3563" }
                ]},
                { id: "anxiety", name: "Anxiety & Relief", duas: [
                    { arabic: "لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ", trans: "Lā ilāha illā Anta...", meaning: "There is no god but You...", ref: "Qur'an 21:87" }
                ]}
            ]
        };

        // --- THEME ENGINE ---
        function toggleTheme() {
            const body = document.body;
            const header = document.getElementById('header');
            const nav = document.getElementById('nav');
            
            themes.forEach(t => body.classList.remove('theme-' + t));
            currentTheme = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
            
            if (currentTheme !== 'light') body.classList.add('theme-' + currentTheme);
            header.style.backgroundColor = body.style.backgroundColor;
            nav.style.backgroundColor = body.style.backgroundColor;
        }

        // --- DUA MODULE ---
        function showDuas() {
            let html = `<h2 class="text-xl font-bold mb-4">Categories</h2><div class="grid grid-cols-2 gap-3">`;
            duaData.categories.forEach(cat => {
                html += `<button onclick="showCategory('${cat.id}')" class="p-4 rounded-xl border border-green-200 bg-white/10 shadow-sm text-center">
                    <span class="block text-sm font-semibold">${cat.name}</span></button>`;
            });
            html += `</div>`;
            document.getElementById('content').innerHTML = html;
        }

        function showCategory(id) {
            const cat = duaData.categories.find(c => c.id === id);
            let html = `<button onclick="showDuas()" class="mb-4 text-green-700">← Back</button><h2 class="text-2xl font-bold mb-6">${cat.name}</h2>`;
            cat.duas.forEach(dua => {
                html += `<div class="p-6 rounded-2xl border mb-4 bg-white/5 space-y-4" oncontextmenu="handleLongPress(event)">
                    <p class="text-right font-arabic text-3xl leading-loose">${dua.arabic}</p>
                    <p class="text-sm font-medium">${dua.meaning}</p>
                    <p class="text-[10px] opacity-50 uppercase">${dua.ref}</p>
                </div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        // --- QURAN MODULE ---
        function showQuran() {
            document.getElementById('content').innerHTML = `
                <div class="flex gap-2 mb-6">
                    <button onclick="setQuranMode('mushaf')" class="px-4 py-2 rounded-full border text-xs bg-green-600 text-white">Mushaf</button>
                    <button onclick="setQuranMode('bilingual')" class="px-4 py-2 rounded-full border text-xs">Bilingual</button>
                </div>
                <div id="quran-display" class="relative min-h-[400px]"></div>`;
            setQuranMode('mushaf');
        }

        function setQuranMode(mode) {
            const display = document.getElementById('quran-display');
            if (mode === 'mushaf') {
                display.innerHTML = `
                    <canvas id="drawingCanvas" class="absolute top-0 left-0 w-full h-full z-10"></canvas>
                    <div class="p-8 border rounded-lg bg-white text-black text-center shadow-lg">
                        <p class="font-arabic text-5xl mb-8">بِسْمِ اللَّهِ</p>
                        <p class="text-xs text-gray-400">Mushaf Mode Active</p>
                    </div>
                    <button onclick="toggleDrawing()" class="mt-4 w-full py-2 bg-blue-500 text-white rounded-lg text-xs">Toggle Drawing Mode</button>`;
            } else {
                display.innerHTML = `
                    <div class="p-4 border-l-4 border-green-600 space-y-4" oncontextmenu="handleLongPress(event)">
                        <p class="text-right font-arabic text-3xl">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
                        <p class="text-sm italic">In the Name of Allah...</p>
                    </div>`;
            }
        }

        // --- TOUCH FEATURES ---
        function handleLongPress(e) {
            e.preventDefault();
            alert("Verse Options:\n1. Save to Journal\n2. Share\n3. Copy Text");
        }

        function toggleDrawing() {
            const canvas = document.getElementById('drawingCanvas');
            canvas.classList.toggle('active');
            if(canvas.classList.contains('active')) {
                alert("Drawing ON: Use your finger to highlight.");
                initCanvas(canvas);
            } else {
                alert("Drawing OFF");
            }
        }

        function initCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = "rgba(255, 255, 0, 0.5)";
            ctx.lineWidth = 15;
            let drawing = false;
            canvas.addEventListener('touchstart', () => drawing = true);
            canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('touchmove', (e) => {
                if(!drawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
        }

        showDuas();
    </script>
</body>
</html>
